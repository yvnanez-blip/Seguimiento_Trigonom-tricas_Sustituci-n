<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Universidad Cooperativa de Colombia, Pasto (N)</title>

  <!-- MathJax -->
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h2 { color: darkblue; }
    .pregunta { margin-bottom: 25px; }
    #timer { font-weight: bold; margin-bottom: 20px; }
    button { margin-top: 10px; }
  </style>
</head>

<body>

<h1>Seguimiento AcadĂ©mico CĂˇlculo Integral</h1>

<div style="border:2px solid red; padding:10px; background:#ffeeee;">
  <h2>âš ď¸Ź Instrucciones importantes</h2>
  <ul>
    <li>Tiempo mĂˇximo: <b>2 horas</b>.</li>
    <li>No cambiar de pestaĂ±a o el examen se anula.</li>
    <li>Justifique todos los procedimientos.</li>
  </ul>
</div>

<div id="timer">Tiempo restante: <span id="time">00:00:00</span></div>
<div id="examen"></div>

<script>

// âŹ±ď¸Ź TIEMPO
const examTime = 2;
let timeRemaining = examTime * 3600;
const alertBeforeEnd = 10;

// đź“š BANCO DE PREGUNTAS (CON FRACCIONES CORRECTAS)
const banco = {

  "Integrales TrigonomĂ©tricas": [
    {
      q: "\\( \\int \\sin^3(x)\\cos^2(x)\\,dx \\)",
      opciones: [
        "\\( -\\frac{1}{3}\\cos^3(x) + \\frac{1}{5}\\cos^5(x) + C \\)",
        "\\( \\frac{1}{3}\\sin^3(x) - \\frac{1}{5}\\sin^5(x) + C \\)",
        "\\( -\\frac{1}{4}\\cos^4(x) + \\frac{1}{6}\\cos^6(x) + C \\)",
        "\\( \\frac{1}{3}\\cos^3(x) + \\frac{1}{5}\\cos^5(x) + C \\)"
      ],
      respuesta_correcta: 0
    },
    {
      q: "\\( \\int \\cos^2(x)\\,dx \\)",
      opciones: [
        "\\( \\frac{x}{2} - \\frac{\\sin(2x)}{4} + C \\)",
        "\\( \\frac{x}{2} + \\frac{\\sin(2x)}{4} + C \\)",
        "\\( \\frac{\\sin^3(x)}{3} + C \\)",
        "\\( x + \\sin(2x) + C \\)"
      ],
      respuesta_correcta: 1
    },
    {
      q: "\\( \\int \\sin(5x)\\sin(2x)\\,dx \\)",
      opciones: [
        "\\( \\frac{1}{2}\\left( \\frac{\\sin(3x)}{3} + \\frac{\\sin(7x)}{7} \\right) + C \\)",
        "\\( \\frac{1}{2}\\left( \\frac{\\cos(3x)}{3} - \\frac{\\cos(7x)}{7} \\right) + C \\)",
        "\\( \\frac{1}{2}\\left( \\frac{\\sin(3x)}{3} - \\frac{\\sin(7x)}{7} \\right) + C \\)",
        "\\( -\\frac{1}{10}\\cos(5x)\\cos(2x) + C \\)"
      ],
      respuesta_correcta: 2
    }
  ],

  "SustituciĂłn TrigonomĂ©trica": [
    {
      q: "\\( \\int \\frac{dx}{\\sqrt{9 - x^2}} \\)",
      opciones: [
        "\\( x=3\\sec\\theta;\\ \\text{arcsec}(x/3)+C \\)",
        "\\( x=3\\tan\\theta;\\ \\frac{1}{3}\\arctan(x/3)+C \\)",
        "\\( x=3\\sin\\theta;\\ \\arcsin(x/3)+C \\)",
        "\\( x=9\\sin\\theta;\\ \\arcsin(x/9)+C \\)"
      ],
      respuesta_correcta: 2
    },
    {
      q: "\\( \\int \\frac{dx}{x^2\\sqrt{x^2 + 4}} \\)",
      opciones: [
        "\\( -\\frac{\\sqrt{x^2+4}}{4x} + C \\)",
        "\\( \\frac{\\sqrt{x^2+4}}{x} + C \\)",
        "\\( \\frac{1}{4}\\ln|x+\\sqrt{x^2+4}| + C \\)",
        "\\( -\\frac{1}{2x} + C \\)"
      ],
      respuesta_correcta: 0
    },
    {
      q: "\\( \\int \\frac{\\sqrt{x^2-25}}{x}\\,dx \\)",
      opciones: [
        "\\( \\sqrt{x^2-25} - 5x + C \\)",
        "\\( \\sqrt{x^2-25} - 5\\,\\text{arcsec}(x/5) + C \\)",
        "\\( 5\\tan\\theta - 5\\theta + C \\)",
        "\\( \\frac{1}{2}(x^2-25)^{3/2} + C \\)"
      ],
      respuesta_correcta: 1
    }
  ],

  "Casos Especiales": [
    {
      q: "\\( \\int \\tan^2(x)\\sec^2(x)\\,dx \\)",
      opciones: [
        "\\( \\tan^3(x) + C \\)",
        "\\( \\frac{1}{3}\\tan^3(x) + C \\)",
        "\\( \\frac{1}{3}\\sec^3(x) + C \\)",
        "\\( \\tan(x)\\sec(x) + C \\)"
      ],
      respuesta_correcta: 1
    },
    {
      q: "\\( \\int \\sec^4(x)\\,dx \\)",
      opciones: [
        "\\( \\tan(x) + \\frac{1}{3}\\tan^3(x) + C \\)",
        "\\( \\frac{1}{4}\\sec^5(x) + C \\)",
        "\\( \\tan(x) + \\sec^2(x) + C \\)",
        "\\( \\frac{1}{3}\\tan^3(x) + C \\)"
      ],
      respuesta_correcta: 0
    },
    {
      q: "\\( \\int \\sec^3(x)\\,dx \\)",
      opciones: [
        "\\( \\sec(x)\\tan(x) + \\ln|\\sec(x)+\\tan(x)| + C \\)",
        "\\( \\frac{1}{2}[\\sec(x)\\tan(x) - \\ln|\\sec(x)+\\tan(x)|] + C \\)",
        "\\( \\frac{1}{2}[\\sec(x)\\tan(x) + \\ln|\\sec(x)+\\tan(x)|] + C \\)",
        "\\( \\frac{1}{3}\\sec^3(x) + \\tan(x) + C \\)"
      ],
      respuesta_correcta: 2
    }
  ]

};

// đź”€ Mezclar
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// đźŽŻ SelecciĂłn
let examenMostrado = [];
for (let tema in banco) {
  const preguntas = banco[tema];
  const aleatoria = preguntas[Math.floor(Math.random() * preguntas.length)];

  let opciones = aleatoria.opciones.map((op, i) => ({ op, index: i }));
  opciones = shuffleArray(opciones);

  examenMostrado.push({ tema, pregunta: aleatoria, opciones, seleccion: null });
}

examenMostrado = shuffleArray(examenMostrado);

let currentIndex = 0;

// đź§ľ Mostrar pregunta
function mostrarPregunta(index) {
  const contenedor = document.getElementById("examen");
  contenedor.innerHTML = "";

  if (index >= examenMostrado.length) return finalizarExamen();

  const item = examenMostrado[index];
  const div = document.createElement("div");

  div.innerHTML = `<h2>${item.tema}</h2><p>${item.pregunta.q}</p>`;

  item.opciones.forEach(({ op, index }) => {
    div.innerHTML += `<label><input type="radio" name="r" value="${index}"> ${op}</label><br>`;
  });

  const btn = document.createElement("button");
  btn.textContent = (index === examenMostrado.length - 1) ? "Finalizar" : "Siguiente";

  btn.onclick = () => {
    const sel = div.querySelector("input[name='r']:checked");
    item.seleccion = sel ? parseInt(sel.value) : null;
    currentIndex++;
    mostrarPregunta(currentIndex);
  };

  div.appendChild(btn);
  contenedor.appendChild(div);

  MathJax.typesetPromise();
}

// âś… Resultado
function finalizarExamen() {
  let correctas = 0;

  examenMostrado.forEach(item => {
    if (item.seleccion === item.pregunta.respuesta_correcta) correctas++;
  });

  document.getElementById("examen").innerHTML =
    `<h2>Resultado</h2><p>${correctas} de ${examenMostrado.length} correctas</p>`;
}

// âŹł Temporizador
const timerSpan = document.getElementById("time");

setInterval(() => {
  let h = Math.floor(timeRemaining / 3600);
  let m = Math.floor((timeRemaining % 3600) / 60);
  let s = timeRemaining % 60;

  timerSpan.textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

  if (timeRemaining <= 1800) timerSpan.style.color = "red";
  else if (timeRemaining <= 3600) timerSpan.style.color = "orange";
  else timerSpan.style.color = "green";

  if (timeRemaining === alertBeforeEnd) alert("âš ď¸Ź Quedan pocos segundos");

  if (timeRemaining <= 0) finalizarExamen();

  timeRemaining--;
}, 1000);

// đź”’ Control de pestaĂ±a
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    alert("âťŚ Examen anulado");
    document.getElementById("examen").innerHTML = "<h2 style='color:red'>ANULADO</h2>";
  }
});

// đźš€ Inicio
mostrarPregunta(currentIndex);

</script>

</body>
</html>
