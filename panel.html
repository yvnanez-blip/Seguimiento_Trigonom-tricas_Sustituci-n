<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel</title>

<style>
table { width:100%; border-collapse: collapse; }
td, th { border:1px solid #ccc; padding:10px; text-align:center; }
.anulado { background:red; color:white; }
.finalizado { background:green; color:white; }
.inicio { background:yellow; }
</style>

</head>
<body>

<h1>Panel de Examen</h1>

<table>
<thead>
<tr>
<th>ID</th>
<th>Estado</th>
<th>Puntaje</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// 🔹 Configuración Firebase
const firebaseConfig = {
  apiKey: "AIzaSyB9-ANws4iOMXw3b2VsSbGSW6vS9zoWtuQ",
  authDomain: "examen-libre-5bb39.firebaseapp.com",
  projectId: "examen-libre-5bb39",
  storageBucket: "examen-libre-5bb39.firebasestorage.app",
  messagingSenderId: "256764575178",
  appId: "1:256764575178:web:ff9a04bf6bee2bb40b6333"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔹 Referencia a datos
const examenRef = ref(db, "intentos/examen2026");

// 🔹 Escucha en tiempo real
onValue(examenRef, (snapshot) => {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  const data = snapshot.val();
  const estudiantes = data?.estudiantes || {};

  for (const id in estudiantes) {
    const d = estudiantes[id];

    tabla.innerHTML += `
      <tr class="${d.estado}">
        <td>${id}</td>
        <td>${d.estado}</td>
        <td>${d.puntaje ?? "-"}</td>
      </tr>
    `;
  }
});
</script>

</body>
</html>
