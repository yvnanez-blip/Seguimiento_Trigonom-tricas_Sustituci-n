<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel</title>

<style>
table { width:100%; border-collapse: collapse; }
td, th { border:1px solid #ccc; padding:10px; text-align:center; }
.anulado { background:red; color:white; }
.finalizado { background:green; color:white; }
.inicio { background:yellow; }
</style>

</head>
<body>

<h1>Panel de Examen</h1>
<table>
<thead>
<tr>
<th>ID</th><th>Estado</th><th>Puntaje</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1jXzATkBnjVYg2khsHaY4d6IDnqNabZA",
  authDomain: "sa-sustitucion-trigonometrica.firebaseapp.com",
  projectId: "sa-sustitucion-trigonometrica",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db, "intentos"), (snap) => {
  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  snap.forEach(doc => {
    let d = doc.data();

    tabla.innerHTML += `
      <tr class="${d.estado}">
        <td>${d.estudianteID}</td>
        <td>${d.estado}</td>
        <td>${d.puntaje ?? "-"}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
