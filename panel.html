<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel</title>

<style>
table { width:100%; border-collapse: collapse; }
td, th { border:1px solid #ccc; padding:10px; text-align:center; }
.anulado { background:red; color:white; }
.finalizado { background:green; color:white; }
.inicio { background:yellow; }
</style>

</head>
<body>

<h1>Panel de Examen</h1>
<table>
<thead>
<tr>
<th>ID</th><th>Estado</th><th>Puntaje</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔹 Configuración Firebase
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "tu-proyecto.firebaseapp.com",
  projectId: "tu-proyecto",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const examenDoc = doc(db, "intentos", "examen2026");

// 🔹 Escucha cambios en tiempo real
onSnapshot(examenDoc, (docSnap) => {
  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  if(docSnap.exists()){
    const estudiantes = docSnap.data().estudiantes || {};

    for(const id in estudiantes){
      const d = estudiantes[id];
      tabla.innerHTML += `
        <tr class="${d.estado}">
          <td>${id}</td>
          <td>${d.estado}</td>
          <td>${d.puntaje ?? "-"}</td>
        </tr>
      `;
    }
  }
});
</script>

</body>
</html>
