<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ingreso al Examen</title>
</head>

<body>

<h2>Ingreso al examen</h2>

<input type="text" id="estudianteID" placeholder="Ingrese su ID de estudiante">
<br><br>
<button onclick="ingresar()">Ingresar</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1jXzATkBnjVYg2khsHaY4d6IDnqNabZA",
  authDomain: "sa-sustitucion-trigonometrica.firebaseapp.com",
  projectId: "sa-sustitucion-trigonometrica",
  storageBucket: "sa-sustitucion-trigonometrica.firebasestorage.app",
  messagingSenderId: "385279091202",
  appId: "1:385279091202:web:f342c612df2d7464b8fd1b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Documento único que contiene a todos los estudiantes
const examenDoc = doc(db, "intentos", "examen2026");

window.ingresar = async function() {
  let id = document.getElementById("estudianteID").value.trim();

  if(id === ""){
    alert("Ingrese su ID de estudiante");
    return;
  }

  const docSnap = await getDoc(examenDoc);
  let estudiantes = {};

  if(docSnap.exists()){
    estudiantes = docSnap.data().estudiantes || {};
  }

  // 🔒 BLOQUEO DE INTENTOS
  if(estudiantes[id]?.estado === "finalizado"){
    alert("Ya presentaste el examen.");
    return;
  }

  if(estudiantes[id]?.estado === "anulado"){
    alert("Tu examen fue anulado.");
    return;
  }

  if(estudiantes[id]?.estado === "inicio"){
    alert("Ya tienes un examen en curso.");
    return;
  }

  // ✅ REGISTRAR
  estudiantes[id] = {
    estado: "inicio",
    fecha: new Date().toLocaleString(),
    respuestas: {}
  };

  await updateDoc(examenDoc, { estudiantes });

  localStorage.setItem("usuario", id);
  window.location.href = "examen.html";
}

// 🔒 ANULAR EXAMEN SI CIERRA PESTAÑA
window.addEventListener("beforeunload", async () => {
  const id = localStorage.getItem("usuario");
  if(!id) return;

  const docSnap = await getDoc(examenDoc);
  const estudiantes = docSnap.exists() ? docSnap.data().estudiantes || {} : {};

  if(estudiantes[id] && estudiantes[id].estado === "inicio"){
    estudiantes[id].estado = "anulado";
    await updateDoc(examenDoc, { estudiantes });
  }
});
</script>

</body>
</html>
