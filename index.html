<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ingreso al Examen</title>
</head>

<body>

<h2>Ingreso al examen</h2>

<input type="text" id="nombre" placeholder="Ingrese su nombre o correo">
<br><br>
<button onclick="ingresar()">Ingresar</button>

<script type="module">
  // 🔥 Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1jXzATkBnjVYg2khsHaY4d6IDnqNabZA",
    authDomain: "sa-sustitucion-trigonometrica.firebaseapp.com",
    projectId: "sa-sustitucion-trigonometrica",
    storageBucket: "sa-sustitucion-trigonometrica.firebasestorage.app",
    messagingSenderId: "385279091202",
    appId: "1:385279091202:web:f342c612df2d7464b8fd1b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔐 FUNCIÓN INGRESAR
  window.ingresar = async function() {
    let nombre = document.getElementById("nombre").value;

    if(nombre === ""){
      alert("Debe ingresar su nombre o correo");
      return;
    }

    try {
      // Guardar intento en Firebase
      await addDoc(collection(db, "intentos"), {
        nombre: nombre,
        fecha: new Date().toLocaleString(),
        estado: "inicio"
      });

      // Guardar en navegador
      localStorage.setItem("usuario", nombre);

      // Ir al examen
      window.location.href = "examen.html";

    } catch (error) {
      alert("Error al registrar: " + error);
    }
  }
</script>

</body>
</html>
