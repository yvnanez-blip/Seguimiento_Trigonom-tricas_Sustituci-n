<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ingreso al Examen</title>
</head>

<body>

<h2>Ingreso al examen</h2>

<input type="text" id="estudianteID" placeholder="Ingrese su ID de estudiante">
<br><br>
<button onclick="ingresar()">Ingresar</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, get, update } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9-ANws4iOMXw3b2VsSbGSW6vS9zoWtuQ",
  authDomain: "examen-libre-5bb39.firebaseapp.com",
  projectId: "examen-libre-5bb39",
  storageBucket: "examen-libre-5bb39.firebasestorage.app",
  messagingSenderId: "256764575178",
  appId: "1:256764575178:web:ff9a04bf6bee2bb40b6333"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Referencia en Realtime
const examenRef = ref(db, "intentos/examen2026");

window.ingresar = async function() {
  let id = document.getElementById("estudianteID").value.trim();

  if(id === ""){
    alert("Ingrese su ID de estudiante");
    return;
  }

  const snapshot = await get(examenRef);
  let estudiantes = snapshot.exists() ? snapshot.val().estudiantes || {} : {};

  // 🔒 BLOQUEO DE INTENTOS
  if(estudiantes[id]?.estado === "finalizado"){
    alert("Ya presentaste el examen.");
    return;
  }

  if(estudiantes[id]?.estado === "anulado"){
    alert("Tu examen fue anulado.");
    return;
  }

  if(estudiantes[id]?.estado === "inicio"){
    alert("Ya tienes un examen en curso.");
    return;
  }

  // ✅ REGISTRAR
  estudiantes[id] = {
    estado: "inicio",
    fecha: new Date().toLocaleString(),
    respuestas: {}
  };

  await update(examenRef, { estudiantes });

  localStorage.setItem("usuario", id);
  window.location.href = "examen.html";
};

// 🔒 ANULAR SI CIERRA
window.addEventListener("beforeunload", async () => {
  const id = localStorage.getItem("usuario");
  if(!id) return;

  const snapshot = await get(examenRef);
  const estudiantes = snapshot.exists() ? snapshot.val().estudiantes || {} : {};

  if(estudiantes[id] && estudiantes[id].estado === "inicio"){
    estudiantes[id].estado = "anulado";
    await update(examenRef, { estudiantes });
  }
});
</script>

</body>
</html>
