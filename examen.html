<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Seguimiento Académico</title>

  <script>
    window.MathJax = { tex: { inlineMath: [['\\(', '\\)']] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    body { font-family: Arial; margin: 30px; }
    h1 { color: darkblue; }
  </style>
</head>

<body>

<h1>Examen</h1>
<div id="timer">Tiempo: <span id="time">02:00:00</span></div>
<div id="examen"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1jXzATkBnjVYg2khsHaY4d6IDnqNabZA",
  authDomain: "sa-sustitucion-trigonometrica.firebaseapp.com",
  projectId: "sa-sustitucion-trigonometrica",
  storageBucket: "sa-sustitucion-trigonometrica.firebasestorage.app",
  messagingSenderId: "385279091202",
  appId: "1:385279091202:web:f342c612df2d7464b8fd1b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const usuario = localStorage.getItem("usuario");

let tiempo = 2 * 3600;

const banco = [
  {
    tema: "Trigonométrica",
    q: "\\( \\int \\sin^3(x)\\cos^2(x)dx \\)",
    opciones: ["A","B","C","D"],
    correcta: 0
  },
  {
    tema: "Sustitución",
    q: "\\( \\int \\frac{dx}{\\sqrt{9-x^2}} \\)",
    opciones: ["A","B","C","D"],
    correcta: 2
  }
];

banco.sort(() => Math.random() - 0.5);

let i = 0;

function mostrar() {
  if (i >= banco.length) return resultado();

  let p = banco[i];
  let html = `<h2>${p.tema}</h2><p>${p.q}</p>`;

  p.opciones.forEach((op, idx) => {
    html += `<label><input type="radio" name="r" value="${idx}"> ${op}</label><br>`;
  });

  html += `<button onclick="siguiente()">Siguiente</button>`;

  document.getElementById("examen").innerHTML = html;
  MathJax.typeset();
}

window.siguiente = function() {
  let sel = document.querySelector("input[name='r']:checked");
  if (!sel) return alert("Seleccione una opción");

  banco[i].resp = parseInt(sel.value);
  i++;
  mostrar();
}

async function resultado() {
  let correctas = 0;
  banco.forEach(p => { if (p.resp === p.correcta) correctas++; });

  if (usuario) {
    await setDoc(doc(db, "intentos", usuario), {
      estado: "finalizado",
      puntaje: correctas,
      total: banco.length
    }, { merge: true });
  }

  document.getElementById("examen").innerHTML =
    `<h2>Resultado: ${correctas}</h2>`;
}

// ⏱️ TIMER
setInterval(() => {
  let h = Math.floor(tiempo / 3600);
  let m = Math.floor((tiempo % 3600) / 60);
  let s = tiempo % 60;

  document.getElementById("time").textContent =
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

  if (tiempo <= 0) resultado();
  tiempo--;
}, 1000);

// 🚫 CAMBIO DE PESTAÑA
document.addEventListener("visibilitychange", async () => {
  if (document.hidden) {

    if (usuario) {
      await setDoc(doc(db, "intentos", usuario), {
        estado: "anulado"
      }, { merge: true });
    }

    document.body.innerHTML = "<h1 style='color:red'>EXAMEN ANULADO</h1>";
  }
});

mostrar();
</script>

</body>
</html>
