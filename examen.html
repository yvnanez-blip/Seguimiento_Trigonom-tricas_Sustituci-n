<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Examen</title>

  <script>
    window.MathJax = { tex: { inlineMath: [['\\(', '\\)']] } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    body { font-family: Arial; margin: 30px; }
    h1 { color: darkblue; }
    #timer { font-weight: bold; margin-bottom: 20px; }
    #timer.warning { color: orange; }
    #timer.danger { color: red; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>

<body>

<h1>Examen</h1>
<div id="timer">Tiempo: <span id="time">02:00:00</span></div>
<div id="examen"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, get, update } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

// 🔹 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "examen-libre.firebaseapp.com",
  projectId: "examen-libre",
  databaseURL: "https://examen-libre-5bb39-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const examenRef = ref(db, "intentos/examen2026");

const usuario = localStorage.getItem("usuario");

// ⏱ TIEMPO
let tiempo = 2 * 3600;

// 📚 BANCO
const banco = [
  { tema: "Trigonométrica", q: "\\( \\int \\sin^3(x)\\cos^2(x)dx \\)", opciones: ["A","B","C","D"], correcta: 0 },
  { tema: "Sustitución", q: "\\( \\int \\frac{dx}{\\sqrt{9-x^2}} \\)", opciones: ["A","B","C","D"], correcta: 2 }
];

banco.sort(() => Math.random() - 0.5);

let i = 0;

// 🔹 MOSTRAR
function mostrar() {
  if (i >= banco.length) return resultado();

  let p = banco[i];
  let html = `<h2>${p.tema}</h2><p>${p.q}</p>`;

  p.opciones.forEach((op, idx) => {
    html += `<label><input type="radio" name="r" value="${idx}"> ${op}</label><br>`;
  });

  html += `<button onclick="siguiente()">Siguiente</button>`;

  document.getElementById("examen").innerHTML = html;
  MathJax.typeset();
}

// 🔹 SIGUIENTE
window.siguiente = function() {
  let sel = document.querySelector("input[name='r']:checked");
  if (!sel) return alert("Seleccione una opción");

  banco[i].resp = parseInt(sel.value);
  i++;
  mostrar();
};

// 🔹 RESULTADO
async function resultado() {
  let correctas = 0;
  banco.forEach(p => { if (p.resp === p.correcta) correctas++; });

  if(usuario){
    const snapshot = await get(examenRef);
    const estudiantes = snapshot.exists() ? snapshot.val().estudiantes || {} : {};

    estudiantes[usuario] = {
      ...estudiantes[usuario],
      estado: "finalizado",
      puntaje: correctas,
      total: banco.length,
      respuestas: banco.map(p => p.resp)
    };

    await update(examenRef, { estudiantes });
  }

  document.getElementById("examen").innerHTML =
    `<h2>Resultado: ${correctas} / ${banco.length}</h2>`;
}

// ⏱ TIMER
setInterval(() => {
  let h = Math.floor(tiempo / 3600);
  let m = Math.floor((tiempo % 3600) / 60);
  let s = tiempo % 60;

  const timeDiv = document.getElementById("timer");

  document.getElementById("time").textContent =
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

  if (tiempo <= 600 && tiempo > 300) timeDiv.className = "warning";
  if (tiempo <= 60) timeDiv.className = "danger";
  if (tiempo <= 0) resultado();

  tiempo--;
}, 1000);

// 🔒 ANULACIÓN
document.addEventListener("visibilitychange", async () => {
  if (document.hidden && usuario) {
    const snapshot = await get(examenRef);
    const estudiantes = snapshot.exists() ? snapshot.val().estudiantes || {} : {};

    estudiantes[usuario] = {
      ...estudiantes[usuario],
      estado: "anulado"
    };

    await update(examenRef, { estudiantes });

    document.body.innerHTML = "<h1 style='color:red'>EXAMEN ANULADO</h1>";
  }
});

// 🚀 INICIAR
mostrar();

</script>

</body>
</html>
